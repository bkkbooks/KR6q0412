body:
  text: 門人本致輯山居詩煙水倦南尋茆菴搆北林道同山並見靜與竹俱深逐日寧辭影安心在息陰夕陽棲鳥定課罷磬聲沉空山誰作伴身與影為雙積雪留深壑孤煙度遠江機忘獰虎善念息毒龍降一種平懷久真成寂滅幢幻寄千峰裏隨緣度歲華世人俱有族衲子一無家林末風聲細雲中日影斜難堪春欲去不忍看飛花野性只宜山舒懷寥廓間法憑流水說心共懶雲閒當吾定方出幽禽去復還此中惟自得與世不相關固窮君子道陋室暢余懷但得中無愧何妨俗不偕空花徒把玩生計懶安排況惜千金體終消一把柴結廬松樹下復用松為椽門就松根設壁將松板編茶收松子煮爐掃松絲然還以松為榻松月照吾眠丘壑古風在鄰菴畔不分地餘同種竹田瘠並耕雲果熟先嘗我黍香方請君茲當吾輩樂薄俗不堪聞啓牖焚香坐秋風冷竹屏四山紅葉亂一榻篆煙輕是日景方淡于吾思益清未知羈絏者此際若為情花間蝴蝶醒問爾黑甜時昔是莊周化今知君姓誰未窮生滅幻安解夢魂為猶惜南華意勞吾一賦詩風裏花神亂雨中蛙吹頻誰憐九十日又過一年春衰質同殘艷空言徒自新那堪清兩眼相看老紅塵淡泊為長策安心獨老禪非關文字得豈藉異人傳托鉢嫌村遠開田較力便仍餘言外意峰頂月孤圓青山歡喜住素性懶逢迎世法何妨淡人情不厭輕雲籠崖樹暗日照水痕明石上蒼苔路尋常只獨行村寺檀那厚山堂一味清晚參忘夜永蚤課候禽鳴如此終身世自然空死生古風惟冷淡吾輩合相承秋砧鳴遠近涼葉日颼颼僧定依山寂鷗眠任水浮是知機息者寧與世同儔堪嘆滄江上更誰垂直鉤日脫青桐葉覆蟲聲似訴起看秋水篇因知養生句得道豈無方致窮欣有具徘徊清素光寒石高天吹冬日山多冷池常不解水遠山惟有雪近境寂無人衲破何妨舊圍爐不惜薪自慚修德淺安得不孤鄰幽谷風光淡情忘物自靈籬間蛇入定竹上鳥聞經日色兼雲暖花陰和草馨堪憐人世上幾個得惺惺道人宜遠俗遂性樂山中燈續松梢月經翻蕉葉風感懷雙樹老得句一花紅此況誰堪共多嫌趣不同從來道與利自是不相參頗有忘機友方堪共草菴家蔬隨地種野菜遍山探秪取尋常用誰嫌吾輩貪單丁居剡上鋤钁樂無窮傍屋留疏竹緣山足老楓梵書翻夜月蟲語亂秋風境寂塵情遠無煩更論空僧俗誰無纍休心纍自輕看空身外物何有事關情直道天相眷無欺夢不驚始終深谷裏庶幾樂平生拽杖獨登眺棲棲鳥鬧林自疑同野鶴何事亦驚禽徑轉孤峰出溪回衆壑深默慚居薄世猶得暢幽尋深山何所樂幽寂不期然有地偏宜竹囊空仍好賢良謀殊物外遠託古人前難舍惟書史禪餘未暇眠風氣日趨下安能似太初溪山饒古意雲物及時娛於世慚無策浮屠賴有書身心猶幻寄此外更何如素懷無俗好活計愛山林木石同知己風泉並素琴慮忘千嶂寂聞入一音深不是幽居久安知古隱心窮谷少人住空山我獨家個中常自足意外復何加如問居山趣休言酬話誇大都無俗物只是有煙霞溪源深釀白雲漿流水烹來氣味香訪道他山皆暫住卜居此地可終藏因尋古蹟披荊棘為創新基就石床一枕渾忘人世夢醒來高詠破天荒百疊青山一個身嶺頭雨過景初新高崖瀑瀉晴空雪小徑花開幽谷春物外逍遙真極樂俗間名利盡埃塵此中自可忘人世何獨桃源好避秦塵埃盡是自甘心幾見英雄肯陸沉得寵有誰懷范蠡事窮徒爾嘆淮陰休云北關恩榮淺當惜南山隱缺深垂老更投荒僻處千秋下必有知音佛誡沙門遠市朝為言底事尚孤標公侯向道惟躬扣天子曾師不可招野鶴秪懷騰碧落海鷗何意下奔潮是知世外無羈侶去處飄然一破瓢非耽遊玩愛青山秪愛青山一味閒習氣從教閒裏斷妄情每向靜中刪屋梁月落頓生白檻壁雲凝漸上斑竹韻松濤清耳目自來憂患不相關菴中盡日吾何事拾得名香獨自焚白日易過人易老青山難得道難聞惟岑惟寂峰頭石忽有忽無溪上雲夢裏每驚時世異只堪麋鹿與同群秪個無心妄自沉何煩雲水費參尋清貧到底情方逸疏懶從教山更深只有松風宣梵韻更無塵影亂禪心古琴別調操猶在不識誰能解正音夏日炎炎似火燒賴居幽谷每逍遙溪雲片片飛來冷嵐氣飄飄近可撩趺坐日移陰石磴翻經風動韻芭蕉炎涼秪是人間有暑到山中也自消從來闃寂是山居一榻清風萬慮除目盡翳花忘起滅撈空水月絶躊蹰玄機自許還龍象文字惟堪飽蠹魚為道有餘仍為學不教錯解聖賢書山中境不費安排溪繞峰回足可佳一任白雲封竹戶從教青草上莓階紛紛極目非他物歷歷于心自偶偕此外更無塵得遣晏然終日坐清齊半窩修竹翠森森添長新篁居倍深有限風光宜取適無涯塵事莫經心捲簾當晝溪雲淡移榻將曛階砌陰且喜青山不用買從吾早晚恣幽尋新晴清景引清機閒看溪禽鬥遠飛風趁雲歸空海甸花排香出襲人衣當年有約同袍友此際無人扣翠薇所得只堪成獨詠固知雪曲和應稀清眠初未啓山窗何處歌聲入草房帶夢將疑過釣叟開門方喜見樵郎溪前霜壓梧桐老籬外風吹橘柚香羽士或來頻採藥為言余也解休糧處世讓他呈伎倆藏身許我道山林峰巒蒼翠曉方露溪水澄停秋漸深白飯新炊香滿鉢黃花初綻色含金道人居此更何事惟有寥寥無住心堪嗟人世不知休轉眼看看白了頭性命工夫無一辦浮雲富貴儘多求花開那見經三宿松老曾云樹百秋智眼觀來方感慨阿誰不是夢中儔剡上山峰個個尖參差如畫向茅菴春時簇簇紅如錦雪裏堆堆白似鹽所賴天公旋幻就不勞人力去莊嚴自憐魂夢嘗相得睡起從容揭草簾竹指才申破蘚錢飛花滿徑帶雲翩閒心似水虛含月宴石如人醉倚軒黃鳥引雛枝上織白猿弄子嶺頭喧不遑應接山陰道一斗茅蓬醒夢緣念余自小懶為家喜與兒童戲聚沙情性至今欣木石夢魂安肯負煙霞一錢不有何妨得粒米如無且自奢壁落任疏風雨夜蓋頭聊藉把茆遮尋常僧俗各爭長今日何妨略較量利鎖名韁人苦具蒲團禪板佛津梁當知世俗災危阱須信空山安樂鄉高著一雙雲漢眼試看滄海變田桑得把茅蓋頭萬事皆可休任從風雨急此處竟無憂情忘心自妙道在不愁貧寂寞深山裏青松常傲人竹外日初暑竹中涼似水坐久心自怡追念古君子觸處有真趣猿聞溪外山白雲飛亦寂流水動常閒濠上觀魚樂園中蝶夢優借問漆園裏那個是莊周不住華房住草房玄機不待再商量尋常趺坐青松下闃寂中聞鶴息長溪畔桃花逐燕飛關心誰不嘆春歸山僧別有閒情緒且喜菴前筍蕨肥僧住深山意固優柴門靜掩冷如秋蒲團一個雲根坐野鳥銜花襲布裘閒看溪雲多變態忽然淡了忽然濃陰晴未定明朝雨不意先吹一夜風草迷古徑不妨勤每喜攜鋤斸白雲斜倚鋤頭看落日山岡塵鹿漫成群關居六首叢林秋晚秪堪悲百丈清規孰護持拂子頭邊如不薦衲衣下事吾誰欺風塵一日老一日岑寂片時安片時所好掩關無別法身居方外合無為數聞荒亂足堪憂擾擾勞生不自繇為避風塵侵病骨且扃蓬戶暝閒眸半窗影碧千山月一竇光澄四海秋屈指同年幾人在吾心休矣復何求浮世曾無頃刻停誰同山野樂清寧關中日月居三載靜裏工夫養一靈橘柚顆黃霜正白雕胡米黑葉猶青自憐時節等閒過閉戶真堪老著經世間無事吾堪任獨掩空關愜素襟趺坐渾忘今日我看書方見古人心庭花砌月投禪思岩桂柯風引靜吟得句於懷殊自樂篋中留稿待知音自喜關居趣味閒況茲關復傍青山因題短句蕉新剪為補疏籬竹故刪紙被勤熏香氣透席簾懶捲雪痕斑此中風景誰相識只有雲禽共往還深掩山扉僻塢東謾云千里有同風雲林自許煙霞合苔徑寧容車馬通竹色映杯茶透緑樺香書篆火潛紅單丁盡日餘何事古教相于樂此中補屋茅蓬年久鼠攻穿風雪滿床心自憐斧鈍磨消溪畔石椽枯斫斷嶺頭煙藤蘿自絆千條線莓蘚頻添幾片錢從此梅花春夢穩奔雷一任老龍顛十僧詩山僧雲岫多松檜蕭蕭來萬籟低頭向下看牛馬似蟻大禪僧坐得蒲團破何愁家活窘俱胝個指頭一生用不盡講僧法華一妙字九句談不徹頑石解點頭何勞鼓唇舌詩僧鶉衣百結心吟成驚世句深文動鬼神誰悟勞生具遊僧遍投佳山水天台訪寒拾驀地問西來悠悠指杖笠貧僧身貧未是貧道貧無剩物煙消古廟中一鉢千家乞孤僧割愛為修行孤居完己志翻然憶隱倫梅鶴猶多事病僧太息健時身倦抬今日手惟同枕子親其外非我有懶僧懶瞪雲漢眼慵揩寒涕鼻三召不抬頭當今還有不老僧髮白志隨灰精神日徂落怪哉老趙州八十猶行腳象田詠觀象田兮景物幽原元化兮明化則山蟠龍兮祖四明勢迢迢兮雲翊翊怪石露兮鷂子尖松妖矯兮虯兒螣盻攢叢兮遠近峰指越州兮一點墨意縹眇兮視聽凝俄混沌兮忘南北坐中聞兮天若語仔細聽兮不可即隔紅塵兮靜可居不干人兮親稼穡大舜耕兮猶老農梵卿祖兮曾修洫飛來廨兮今不飛動靜道兮人莫測自來風兮達自然鑑舜井兮清可克羅漢塘兮水清滄小天台兮山崱屴好鳥鳴兮韻致高棲翠竹兮候生食將得食兮聲喈喈余默時兮他亦默筧流泉兮便種蔬澆花果兮易討力果將熟兮松鼠多半咬破兮情難拭善言囑兮若不聞日徘徊兮管到黑穀麥熟兮人暗偷菜甲肥兮蟲又蝕設謹防兮不奈何訕吾儕兮沒慈侐作佛易兮為人難三自反兮心不忘世紛紜兮冷世腸自坦率兮還自得愛山水兮不憚勞任甜淡兮學韜匿翻貝葉兮導山靈課坐禪兮奉己職覺荒唐兮笑鷺鷥殊獨立兮傲鸂鷘防疏惰兮學種瓜任優遊兮曠胸臆盼窮途兮嘆阮狂顧老梅兮哀靖殖何所為兮掩山關每相笑兮問奇特月孤懸兮境未忘且隨緣兮調平亥青山諾兮如我懷老青山兮何所惑即事喻古靈監院屋壁雖疏破應知勝樹間精神能有限日月況無還所為道難辦將非余愛閒楊岐真可法不是妄追攀物可入剡山採茶賦得辛苦歌為贈莫辭辛休道苦既為僧師佛祖佛祖皆從苦過來聲光浩浩垂千古朝辛苦暮辛苦賦性拙勤可補那事雖然本現成也須福智為佐輔苦娑婆無不苦火宅喻君稔睹藉此堪忍勵吾操存心期與古人伍舊年已辛苦今年又辛苦苦因緣君薦取薦取從前苦者誰威音那畔無賓主無賓主有何纍為君歌採茶去西來大意滿茶山眼辨手親無處避昔日溈山勘仰山仰山便撼茶樹意者般節目豈難論直須用去忘猜忌理非理事非事一回碾碎紫龍團習習清風生兩翅脫然未透古人關捩子寧許棲遲安樂地好光陰莫虛棄此去好看經風耐雪黃金芽烹來滿碗冰霜氣寄贈天華正衡關主不自掩重扉安知與世違定中忘歲月靜裏泄真機避俗地兼遠愛閒人更稀關居吾亦久此道固深微送爾戒兄長往千嶂孤明一夕分疏藤挂斷剡溪雲鶴飛數轉滄浪外為弔蘆花影不群贈豫默兄同謙光園居僻寓荒園裏高懷俗莫知人心俱有屬君意獨無為日宴起嫌早月低眠故遲料來交際少相得狎鸕鷀壽得法和尚時和尚住持雲門曾聞玄侶話遊終南邂逅異人佩劍攜甔飲伊瀟湘道經商藍山有數老同坐小菴其鬚皓如其貌憨憨問渠路徑以目視韽勢跨蒼穹足音洞函物陳奇狀花見優曇遙光奪目高巒有三正中一門懸石如弇山深境寂峽麗雲含上有重臺高不可探偶見蒼龜背圓毛毿毫光恍欻五氣相惔左有老柏婆娑大澤亦多芝草有群仙奕右傍古椿高千萬尺樹上老鶴鵬大而白樹下鹿藪孫麑育奭鹿和鶴鳴上天驚懌溪前牧童騎牛讀易令騎此牛其臺可適瞥爾之間見苔上額風鼓真氣飛光赫奕直造其堂形容莫格香空人心風清人魄非高士居必聖賢宅中有一叟神明敦厚風骨剛悴寶冠嚴首萬指圍繞作獅子吼扣彼大道直指本有問渠春秋手指南斗祝願雲門同彼福壽次和尚啓寶壽石田禪師塔韻三絶寶塔既現矣試身堪是誰不因親著眼千古許誰追五百年前話五百年後言開門憶閉者一笑自知源深廣尋尺餘全身曰裏許注念光不隔特地薦黎糈金澤十詠并序嵌石長兄自己卯掩關於金澤頤浩寺微笑堂即佛鑑和尚弘宗處也每于禪寂之暇即其鶯啼花笑月落霜飛餐採而為詩闡夫微笑之意及表徐公袞衣護法之誠詠懷不已燦然成章併賦八景諸作以慨疇昔之盛意欲使諸緇白知有此段大事因緣豈小補哉遂信筆微笑堂迦葉一破顏笑聲千古遍快哉頤浩寺建此堂獨善有袞樓袞衣珍護法重在袞衣人有袞樓如在遺風與日新五老峰玩此五老峰何似廬山者得趣乃為優萬物總一馬空假山平地疊為山日夕恣登眺前後望菰湖湖人弄輕棹不斷雲神奇不待論致雨宜君事每看電光中自有從龍勢梅雪軒梅雪難兄弟名軒意最新玩時詩興發宜得雪梅神簷葡室簷葡有清香高僧命為室懷幽宜此居珍重花狼藉天香亭天香異世香氤氳空中布步月此庭前餘芬聞墜露貝多林每入貝多林如聞仙梵音無心入三昧浮慮頓消沉金鯽池循飛騰賦性晦跡養全神試待春雷動乘風躍錦鱗東山棋墅石上楸枰久昔人還在否松楸影亂敲風月偶然友黑白能誤人行藏讓隱叟試看樵子過斧柄誰無有小東山奇哉兩峰高自名為小東居高以卑處大有道人風蒼蒼松杉谷蕭蕭兩三禿土瘠少腴田沿山種黃獨但不學古人一年三百六饑倉飽便休何須蔑朿腹興至偶然歌擊木驚山鶴山鶴竦然聞漸近漸相屬不須名世花自長青青竹槲葉侵雲香古藤垂異木春有映山紅秋有傲霜菊何貴金谷園聊堪以逸目金谷景雖饒買石成山碌斯山天生成居之豈小福總在天地中于世不同軸山下桃花飛山上梅方馥雲深花自遲樹老果先熟愛夏日深涼喜秋氣高肅所茹惟菜根壯歲如僚倒人老鬢猶蒼鬢蒼心已老歌笑友同聲何異寒山道徑僻行蹤稀花落寧容掃三冬更好笑日頭搕著腦寒灰驚爆豆何用問伊討或時豁遠眸山陰山水渺南顧剡溪長北覘秦望小綽約西子來若水浮鷗鳥五雲繞若耶屈曲如絲嫋兩岸高遠林隱隱似禾秒茲山久埋頭始得吾儕投誓不走名利願為終老儔夢中猶得意覺憶頗奇猷白日兩無事相對常悠悠真源流白乳可以潤詩喉青嶂有雲鹿可以同遨遊山中所出息頗足度春秋藥簡藥方種花依花史修自足知自若心幽境更幽佳山併佳侶塵世亦難周半生貧所博可以忘百憂吾將與天言欲起高高樓春夢春山澀斷花間路嘔虎驚風落花露暝戛香吹入竹鳴蕭嘈呼枕飛聲度山頭光吐擬天開山腹歸雲擊關戶欲藉輕雲踴碧空清磬一鳴如昨寤柴門犬吠和盤銘兄韻安貧僧舍少桑麻小犬尋常只管花荒徑豈容過駟馬生池誰敢摝魚蝦驚風驚月聲應緩關雨關晴亦不譁今夜無端聲切切多緣漁火隔溪斜筆淚歌并序石屋一均老師以道義相愛交往有年矣每敘間未嘗談及世諦唯以佛法為念多慨今時禪病單尚見識不知有函養工夫乃被逆順境緣和身沒卻猶為全體作用引經據教將一切障礙即究竟覺等論併古德機緣為證實此老師所深痛惜者嘗諄諄然以香林趙州不雜用心等語誨及至于墮淚處多也又素招現同住因自癖犯山居獨處有孤其願師壽逾古稀矣自壬申歲結制柯亭季冬示微恙及孟春若愈現往叩之喜不自勝暢語連日引古人知有奉重之語疊出恨己不能為法門增氣為嘆臨別囑云而今時道不古唯住山庶幾也今日一別不及再見矣攜杖送出山門悵望而別于癸酉五月間是日早囑付快作龕遍閲祖像已索筆寫偈跏趺而逝時現在小天荒屢夢日月西墜一日聞訃音痛絶而蘇淚下如雨嗚呼不及再遇矣今于耳目間迥迥然惟一老師意忘之轉轉如在繇是舉筆淚而歌之歌曰日月西墜世途危矣巨樹摧頽庶無居矣秋風蕭蕭山寂寥矣矧奚悴憔懷悠悠矣嗟兮忡兮絶帡幪矣眷西顧東天悾恫兮哲人靡兮道幾窮兮仰白雲兮問清風兮宣離微兮慰憂衷兮伏惟格思藥瞑眩兮策剔玄源擊閃電兮磨厲禪雄麾素先兮不飭不諱互聞見兮古兮今兮別方甸兮在為之則兮沒令警栗矣雲死雲生兮影動神謐矣經斯時漸兮知音何戌矣願勿售昨兮斯心委畢矣鳳隱麟潛兮寧再出矣莫為之歌兮淚零筆矣和石簣先生題蘭芎韻贈瑞峰關主形勝從來不自陳知音點出一番新藤花草果藏靈藥鶴跡仙蹤隱石鱗學道既能追古德題詩寧肯讓前人可中兩眺難同語極目誰諳不是塵送大生參方落落象田山裏僧且喜不曾諳佛法江北江南任腳行泥水莫教輕濺著贈君謙族侄二首貧賤志須恬交遊義尚廉騎牛堪讀易成務信憑占多學理自得闕疑書下籤聖明徵有道君術善能謙苟復初心善自然能日新染情早晚淡靜慮見聞真有志從先子何妨作野人直饒文雅士此不易為陳擬洞賓參黃龍精氣載神遊天淵凡世聲色一斂藏真息內發天根光精神炯炯照滄茫河車自運歸黃房白鹿紫芝生河傍寤寐閒閒靜一床龍昂虎伏龜蛇盤主人惺惺視明堂黃婆婀娜醉郎當三十六宮春正芳花氣氤氳風異香召爾瓊京時分良俄陟太清無有鄉下視八荒空蒼蒼凡愚錯識殆可傷庶幾神仙大眼眶內外諦觀規中常物慮冰消形神忘杳兮忽兮靈化閶乾坤日月葫蘆囊隨意卷舒妙無方陰滓煉盡號純陽真境自任氣鷹揚翩翩跨鶴過瀟湘來參黃龍矜自強粟藏世界九轉羌鍋煮山川配酒觴卻遭黃龍呵空亡聽之悱憤氣荒唐腰間飛劍逞猖狂空中飛繞音凄鏘左右將刺難近旁一咄兩劍插高岡收之不去心倣徨信得禪門別有長重新屈膝啓法王驀與一拶空飛霜饒君雲水徒跨張雲盡水乾爾何將神機到此亦難量猶待黃龍出現章伊人方悟非玄黃始知壽命本無疆不煉汞中金玉漿詠蟬所性能清潔時棲擇柳陰無功恥食粟飲露自甘心蛻質如仙化愴音似苦吟愁生羇客夢歸思轉教深種茶乞得蒙山一段春將來深種白雲根每從雨後頻芟草待摘新芽醒夢魂
