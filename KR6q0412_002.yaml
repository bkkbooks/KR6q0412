body:
  text: 書記淨珠録門人本致輯頌古世尊初生特達施為非近理真龍不在丹青裏分明説與無人解莫怪杜鵑啼不止世尊睹星六年坐得眼如眉忽睹明星便謂奇啞子遊春作麼説風流豈合自家知世尊升座首出庶物倩影難描七佛之師蜜口心刀咦靈鯤獨運兮摩雲降霄枇杷肯翠兮梧桐肯凋世尊於一切衆前現大神力出廣長舌上至梵世以相見如來是人無智慧口縫未開時舌已超梵世外道問佛有句無句世尊良久外道謂開我迷雲死活將來難世尊世尊有耳若無聞從教伎倆全消落方入吾家解脫門阿難隨即問外道有何見處便云得入世尊云如世良馬見鞭影而行良驥天然自不群不煩鞭影驟風雲駑駘側耳瞪乎後猶待重論蓋代勳善財參德雲比丘瞻風撥草路方窮四顧寥寥兩眼空莫怪德雲無覓處只因親到妙高峰按下雲頭過別峰誰知不覓卻相逢芒鞋踏遍春方歇無影枝頭花正紅文殊三處度夏歸會中解制迦葉欲白椎擯出會中有無量文殊世尊云汝欲擯那個文殊淨眼何曾著得沙一塵才翳落空花文殊無數將誰擯笑倒傍觀老作家女子出定伯夷叔齊恥食周粟介子焚身比干剖腹哭不得笑笑不得哭一曲離騷自隱身汨羅江上空撈摝少林面壁折蘆暗渡躡寒冰憨坐棲棲冷徹心不料雪中人斷臂腥風千古振叢林百丈參馬祖一喝耳聾惟自知得便宜是失便宜無絃音韻誰能會須把黃金鑄子期佛法從來不順情耳聾吐舌話分明小根魔子隨人轉往往空瞪鬼眼睛德山參龍潭一夕侍立次至更深潭點紙燭與師師擬接潭吹滅師于此大悟暗向當空書一字行人覿面卻成迷紙燈吹滅方明見始信無題是大題德山托鉢意外之談沒主賓尋常驀面便欺人曹溪波浪如相似無限平人被陸沉睦州舉一不得舉二買上明知買下放生始悔打殺二人同心其利斷金僧問睦州一氣還轉得一大藏教也無州云有甚饆饠䭔子快下將來饆饠䭔子下將來擔板老師圖口實頓漸偏圓且許你大經敢保轉未得趙州賭餅洗耳其如落一籌飲牛何事占高流堪憐二子輕天下可怪驢蟲鬥趙州趙州問僧甚處來僧云雪峰來州云雪峰有何言句示人僧云雪峰尋常道盡大地是沙門一隻眼汝等諸人向甚處屙州云上座若回寄個鍬子去尋常默默念彌陀見者咸疑暗罵他知己幸遺間話柄只應撒手笑呵呵青州布衫長江影浸一天秋霜葉颼颼風骨愁野老忽歌新水令浪花驚起月邊鷗臺山婆子冤有頭債有主狹路相逢不容己殺活鋒藏語話中冷口熱心誰個唯唯不唯已已已負恩者多報恩者幾萬法歸一一歸何處萬法歸一一歸何老鼠搬金恨不多爭奈肚飢喫不得雖然似有卻如無婆子燒菴寒崖何意避陽春倩女無端解誑人燒卻茅菴渾不管一回拈起一回新南泉斬貓拈出無情三尺鐵虛空也著流鮮血草鞋獨貴逞風流拈得鼻孔失卻舌非折合有正經公憲容情罪不輕南泉云心不是佛智不是道逢人且説三分話未可全拋一片心琴子無絃如弄引世間幾個是知音南泉不是心不是佛不是物野渡無人解問津自言自語抑傷神杜鵑枝上啼紅雨啼亂東風楊柳春莊上喫油餈江北牯牛伸一鼻攪亂江南千頃麥若作神通法爾看馬驢相對膽生寒溈山笑問得孤高答亦親呵呵赤膽向人傾布單賣了渾無事卻使溈山笑轉新溈山水牯牛喚作溈山又是水牯喚作水牯又是溈山兩邊不實中道亦間青山疊疊古澗潺潺行住坐臥常在其間洞山價禪師過水睹影大悟無底籃盛活死蛇藏身露影混塵埃獨臨水鏡忘回互渠我相逢擘不開明中暗去還來謾把空花石上栽脫或邈成虛幻影遠山如黛望天台洞山麻三斤如何是佛麻三斤無星稱子好生稱鉤頭曲是初三月看去迢迢十萬程洞山辭雲岩問百年後有人問還邈得師真否如何秪對岩良久曰秪這是師沉吟岩曰價闍黎承當個事大須審細畫虎畫皮難畫骨知人知面不知心鴛鴦毛羽金針出彩線無施何處尋僧問洞山清淨行人不入涅槃破戒比丘不入地獄何如山曰度盡無餘影還他越涅槃一葉翩翩不繫船夜深月落正堪眠蘆花兩岸無餘影白鷺飛來破曉煙洞山因僧問寒暑到來時如何回避曰何不向無寒暑處去曰如何是無寒暑處曰寒時寒殺闍黎熱時熱殺闍黎目窈窈兮見而不見耳肅肅兮聞而不聞明暗代謝兮虛空常若寒暑變遷兮至道無分偏來正去兮虛舟不繫功明位轉兮郢匠運斤寒時無寒暑時無暑父來就子寒時寒殺熱時熱殺臣去朝君還知有那邊事麼夜來何處火燒出古人墳洞山蛇咬蝦蟆救取還他不救人豈從形影妄疏親機輪活轉無蹤迹叵耐漁郎錯問津雲門偃禪師因僧問如何是超佛越祖之談師曰胡餅超佛越祖談胡餅何奇特自古真師子咬人如火急乾屎橛拈出通紅鐵一圇哪吒辣手一難捫曾經巴峽猿啼處不是愁人莫與論觀音胡餅黃鳥啼春黃菊令秋風吹起故園春易識陰陽顛倒術難知石虎産麒麟回天關轉地軸日出西月東沒兔生絲馬生角倒騎驢登華嶽言前薦得自噓噓句下承當阿錯錯門裏出身易身裏出門難句中無句若為參才著思量早不堪脫體道來猶不許那容儱侗逞瞞盰翠岩眉毛伯夷之清下惠之和伊尹之任孔子之時噫身到黃河此心不死三千里外切忌錯舉無著五臺與文殊對談三三不解問均提石火寧容佇所思端的大人門下事依稀不許野僧知俱胝指頭禪既知明本分又用指頭何斫卻月中桂清光應更多大顛擯首座才得春風花正開翩翩蝴蝶過牆來忽然又被風吹落庶免遊蜂胡亂猜臨濟見僧入門便喝佛法無我無人何勞特地生嗔引得瞎驢趁隊當陽亂觸嘉賓臨濟一喝分賓主一喝誰云分主賓垂鉤意在釣金鱗繇他白浪風濤險收放須憑把柁人興化擯維那自來無實法于人興化老漢解當真屈辱維那猶自可餘殃後代恨何伸芭蕉拄杖貪者不與廉者不取忘取與者一任隨喜鼓山赴請凡聖交參總成戲何如傀儡夜登場夜闌人散場收後留得虛聲到處揚水菴一禪師曰西天胡子因甚無鬚西天胡子沒髭鬚逐日同門見也無不是頂門開隻眼寧知此語不欺吾佛照禪師因孝宗宣問釋迦佛入山六年所成何事對曰將謂陛下忘卻六年坐臥白雲深天眼龍睛孰解尋幸賴君恩猶記得春風化雨滿叢林疏山造塔為賣丁田故弄錢登山志豈在腰纏幸然古佛諳家計一狀領過公案圓疏山嘗手握木蛇有問手中是什麼曰曹家女以木為蛇早眼花那堪字女姓曹家無端邈摹虛空骨怪得溈山笑轉賒夾山無義語草年胡亂語如雷平地無端起骨堆伶俐衲僧忽掀倒一坑埋卻請無猜如來轉物有物可轉被物轉無物可轉轉亦多有無心物兩不立虛空奚礙白雲過楊岐三腳驢子弄蹄行心意相像馬面團圞驢子三腳明眼難瞞雪峰砂米淘米淘砂驗若翁無錢名紙信難通饒將砂米一時去尉斗煎茶銚不同重勘過活搏龍相見饒伊過別峰雪峰云望州亭相見了也烏石嶺相見了也僧堂前相見了也望州烏石先相見莫看仙人手中扇若然不具摩醯眼等間錯過娘生面僧堂前見又怎生脫底漆桶不勞呈雪峰召曰傋頭陀何不遍參去備曰達磨不來東土二祖不往西天峰然之懶向青山舉足渾忘白日移輪翡翠踏翻荷蓋鷺鷥衝破溪雲雖是龍頭蛇尾到底卑不動尊僧問巖頭古帆未挂時如何師曰後園驢喫草古帆未挂蓼花汀水碧蘋香野趣真料得問津人不解風前一笑動江濱雲居膺禪師因僧問羚羊挂角時如何師曰六六三十六好個六六三十六斬草為籌數不足蹤迹羚羊固不同癡狂獵犬空相逐曹山章禪師因僧掃地次曰佛前掃佛後掃答曰前後一時掃師曰與我過靸鞋來善屬文者不起稿善走之人不觸道説得分明直甚的爭如過靸鞋來好南院顒禪師問僧名甚麼曰普參曰忽遇屎橛時如何曰不審師便打普參不審乾屎橛不審便打知賞罰若然特地審將來肯把不審輕埋沒九峰不肯泰首座石霜枯木誰堪偶布衲區區嘗克守將謂坐斷九峰舌孰解返遭渠毒手噫久案誰為斷不平烏臺之畔起包丞雲蓋問石霜學人無奈何時如何霜曰老僧亦無奈何雲霞作飯滿林泉露柱無心不解餐禪客有心餐未得只應常供覺皇前龍湖問石霜曰祖師事肯相付乎霜云莫謗祖師好湖云是虛妄耶霜云是實事耶仰之彌高鑽彌堅瞻之在前忽後焉非實非虛傳未得教君莫謗祖師禪張拙參石霜巧不可得拙何為點鐵成金不費辭隨順世緣成大用孰云妙悟不從師地藏種田熏風翻片雨翼翼野苗新浩浩商禪處何如樹下人僧問落浦一向何處逃難浦云闤闠中避秦闤闠一何深為報漁郎莫浪尋啼斷子規花事了杖藜間步緑楊陰報慈嶼禪師因僧問如何是佛性師曰誰無又問淨果果曰誰有佛性誰有誰無自己原不糢糊大人磊磊落落嬰兒哆哆啝啝同安丕禪師因僧問依經解義三世佛冤離經一字即同魔説如何師曰孤峰迥秀不挂煙蘿片月行空白雲自異依不是離不是玄機妙處須神會孤峰元不挂煙蘿片月行空雲自異是則是莫錯會乘言猶未離心意撒手懸崖蘇醒來斯時宗教渾間事佛印問東坡云四大本空五蘊非有學士向甚麼處坐士無語師代云適才冒犯捏定咽喉塞卻口一切佛法誰敢有牢關把定不通風飛騎將軍何處走白水聲色聲非聲兮色非色狼藉幽芬滿都邑呼盧喝采非丈夫萬兩黃金只一擲瑞巖彥禪師嘗坐石上每喚主人翁復應曰惺惺著他後莫受人瞞惺惺石上重重喚無耳阿師孰解聞喚起怪生連纍汝傍觀俱道弄精魂玄沙三種病人佛法不在陰界裏三種病患無端起地藏善回逆水波玄沙自合慚惶死玄沙白紙封取虛空上雪峰果然千里喜同風為憐漏泄虛空髓仍把虛空漫塞空仙棋仙著許誰曉勝負尋常一笑了堪憐傍玩採樵翁爛卻斧柯何處討鏡清道怤禪師因僧問未達其源請師方便師曰若是其源怎受方便不識其源出處何誰知與世不同波瀾翻不借東風力倒嶽傾湫見也麼鏡清問門外是什麼聲曰雨滴聲師曰衆生顛倒迷己逐物門外何聲輕借問髑髏穿過不多爭衆生顛倒無分曉解作蕭蕭雨滴聲風穴昭禪師因僧問如何是道師曰五鳳樓前曰如何是道中人師曰問取城隍使者五鳳樓前達四方城隍使者貌堂堂鷓鴣自古啼南國風氣初移到北方風穴因僧問如何是佛曰杖林山下竹筋鞭杖林山下竹筋鞭偶露春風舞翠煙杜宇聲中歸去好休教遺恨在桑乾明招謙禪師上堂衆才集曰今日風頭稍硬不是汝安身處且歸暖室商量便歸方丈大衆隨至師曰才到暖室便瞌睡以拄杖趁散風頭稍硬便抽身暖室商量意氣新開眼其如皆瞌睡一時趁散有來因白馬靄禪師因僧問如何是清淨法身曰井底蝦蟆吞卻月寸草拈來善隱身蝦蟆吞月顯諸仁果然獨步威音外別有壺天不夜春首山念禪師因僧問親到寶山空手回時如何師曰家家門前火把子門前火把照荒涼空手歸家活計長若也貪他一粒米管教失卻半年糧首山因僧問如何是祖師西來意師曰風吹日炙不是心兮不是佛風吹日炙是何物窮深不必復挑燈照破多年山鬼窟法眼益禪師因琛和尚問何往曰行腳去曰行腳事作麼生曰不知曰不知最親切衲僧行腳事何如親切原來當不知行到水窮山盡處坐看雲起夕陽時法眼因僧問如何是曹源一滴水師曰曹源一滴水答處仍將問處酬從來直道懶綢繆茆庵一個源頭上那管飛花逐水流天台韶國師因聞前語即得開悟萬山堆裏碧崔嵬占斷春風消息稀無意反聞聞底事曹源一滴絶流機宋太祖問臥龍深處不朝天來此何事雪竇云難逃至化白雲巖下不貪間直欲敲開金鎖關不是無心逃至化大都有意面堯顏宋太祖托鉢問王隨大庾嶺頭提不起今日因何在朕手裏丞相無語不忘付囑作家君治化淵源迥不群托起鉢盂輕借問智臣應得諳斯文僧問投子一大藏教還有奇特事也無師曰演出一大藏教嘗言一字值千金寫盡黃庭一卷經世上所傳皆膺本徒然留得換鵝名五祖戒禪師因僧問如何是佛曰踏著稱錘硬似鐵稱錘踏著硬紏紏拾得歸來便好休只個己靈仍不重阿誰更向佛邊求太陽玄禪師曰道即不辭恐上紙筆在驀會觀音吳道畫始知處處得逢渠道即不辭恐上紙斯言鐫石又何如清涼燈禪師問如何是西來意僧曰不東不西師不肯僧即躡前問師曰不東不西殺活從來作者機莫將心識妄思齊鳳凰鳴在青霄上爭比山雞胡亂啼慈照圓禪師因僧問如何是佛曰水出高原水出高原味異常休從漣漪裛餘香源頭本在威音外佛祖從來不敢嘗慈照圓禪師因僧問如何是古佛家風師曰銀蟾初出海何處不分明轉出水輪空界行千山萬水忽光明衆生心地元清淨古佛家風自坦平盡道金波無透露誰知銀漢好藏形棲棲烏鵲南飛盡又聽啼雞報五更慈照因僧問如何是不動尊師曰提不起甚的提不起目前露些子不與同床臥誰知被無裏慈照因僧問如何是佛法大意師曰一畝之地三蛇九鼠一畝古地足蛇鼠沒量大人請隨喜舉頭明月在孤峰放目已臨千澗水佛鑑禪師因僧問如何是佛師曰喫飯咬著砂喫飯咬著砂連飯須吐卻肚裏沒冷病不消服熱藥大慧杲禪師因僧問心佛俱忘時如何師曰賣扇老婆手遮面無心作佛佛無心個是叢林沒處尋陌路忽然親會著幾乎無語對知音高峰上堂作女人拜八十老婆重帶花淡粧濃抹拜年華只圖諸子伸眉宇淨眼誰知也撒沙高峰悟道因緣其來久矣比年衆論紛然各封己見莫一是非余因不揣鄙陋欲以己見折中之輒作十頌謹似宗匠雖亦掉棒打月然而知我罪我我何辭焉本來非佛亦非心無夢何緣夢裏尋莫謂主人成斷滅不聞聞即是觀音夢想俱無睡正酣茲時孰與對談禪醒來忽地開雙眼月挂長空印百川一拶五年疑不徹聞聲薦去話頭圓但得時中不瞌睡蒼蒼元是舊青天懵懂無知水牯牛頂門撲破展雙眸當年枉向無中覓到此方知總自繇劫外今時有宗旨尊卑貴賤當知耳驢前馬後認主公者等何曾出生死娘生皮袋假名人似幻如風總不真一念不生誰是我豈容仍認夢中身撲落無物豈不偉頭正尾正能有幾若然死抱主人公雖作閻王猶是鬼法身不墮於諸數執有執無總差誤有想無想仔細觀是我非我秪者個遍界無我遍界身莫依己見妄疏親須將猴子一刀斷始見本來真主人露柱燈籠競不休聊將古句為君酬而今四海清如鏡行人莫與路為讎一喝金剛王寶劍萬里飛霜一劍收揮時魔佛盡含愁直教舜若難逃避死活須來劍上遊一喝踞地獅子石頭坐破未開口狐自潛蹤象自走夜深極目月光寒肯向南巖看北斗一喝探干影草你誦詩書我讀易烏焉莫是探來客生平不作虧心事半夜敲門不驚喫一喝不作一喝用木人執笏舞三台禮豈玉帛云乎哉楊柳蘊情歌石女樂豈鐘鼓云乎哉偏正五位正中偏金烏夜半麗中天本來非照非非照突出無門顯妙傳偏中正動涌吼擊誰司柄萬民樂業夜停巡道泰不傳天子令正中來玉堂無鎖禁門開靜鞭初嚮香雲裊不挂纖絲舞御臺偏中至大權在握無猜忌推枯拉朽戲功前豈待心空方及第兼中到該羅五位三玄要內外和融賓主忘山門佛殿呵呵笑問答答海岸黃居士十二問并為頌出問法身有三種病兩種光且道是什麼病什麼光答幾乎錯答頌雲山疊疊流水漫漫擒虎容易告人固難問雪覆千山為什麼孤峰不白答阿誰面前無三尺暗頌眼不自見耳不自聞兩個八兩元是一斤問如何是夜半正明天曉不露答明修棧道暗渡陳倉頌至人出處隱顯無方身居朝市意在滄浪問東山水上行畢竟明什麼邊事答烽火連三月家書抵萬金頌雁聲本哀猿聲本切忽動秋砧一鳴腸絶問坐斷十方猶點額密移一步看龍飛如何是密移一步答裏急屙去頌煮鳳烹龍未足驚異喫得撒得福不思議問從天降下則貧窮從地湧出則富貴如何是從地湧出則富貴答禹力不到處江河流向西頌舊性不改仍舊下海臭鯗爛鮓賣與要者問清光照眼卻迷人明白轉身猶墮位意作麼生答幽州猶自可最苦是新羅頌關中令嚴不許私市一家有事四鄰坐罪問楊大年云八角磨盤空裏走是何意旨答秋風生蟋蟀鳴頌有口無舌證龜成鱉西國鄉談音韻自別問上座以露柱明不遷義水流風動又作麼生答火就燥水就濕頌旋嵐常寂兢注不流火傳薪滅切忌他求問玄沙云諦當甚諦當敢保老兄未徹在請師道一句答者田庫奴頌者田庫奴一刀兩斷放過一著三馬九亂問杜順和尚云懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膊上意旨如何答道火不燒口頌大人坦蕩開口廝當無實無虛不誑不妄問壽昌大師云奮然揣出虛空骨驚起須彌折斷腰答言不該典君子不談頌言不該典君子不談木童何意特地詀喃答雲怡陳居士十七問問渴鹿逐陽焰時如何歇答只須高著眼不用動干戈問摩尼珠久埋沒塵土中如何急切覓得答到頭霜夜月任運落前溪問一斬一切斷如何得此利劍答劄問等是水味有品為第一泉有品為第二泉作何剖分答飲者自知問黑夜中認賊為子認子為賊作何判斷答唯雲怡問家親作祟如何處置答家堂前上一分羹飯問的的主人公如何得覿面一見答莫怪相逢不相識問堪輿家羅經縱橫移動針必指南是誰作主答居士莫嫌無棒分麼問家宅是諸人生身活計見得什麼便肯破家散業答我聞上古其風朴略問電光中良驥瞬息千里如何得一往追上攬轡入手答知音不在頻頻舉達者應須暗裏驚問大慧云將八識一刀憑什麼安身立命答山高月小水落石出問胡來胡現漢來漢現是鏡體是鏡光答古岸黃鸝弄好音六橋桃柳不勝春問未開口以前為甚便棒便喝答將為仙陀婆問日升月沉雷轟電掣水流花開農歌牧唱婦誶兒嬉莫非是這個迸現如何拈向得腳根下要用便用答白家酒三盞猶道未沾唇問修行人多怕去後黑漫漫地不知現前黑漫漫地更苦盡説生死事大不知現前剎那死死生生更切此際重關一擊如何下手答打鼓下滄洲問高峰語大徹的人不脫生死為甚命根不斷命根未斷而云大徹徹的何事答明年更有新條在惱亂春風卒未休問一句當天百萬門永絶生死者一句得恁麼有力答為我移卻淨瓶來答盤銘師十六問問古人道青山覆白雲白雲終日倚為什麼又有道白雲與青山從來不相到答夜來無相火燒出古人墳問受盡天下人供養不知慚愧者此人如何答土地前更著一分問又有一人知慚識愧不受一切人供養者如何答髑髏裏眼睛問如何是向去的人答人情可恕問如何是卻來的人答物理難容問如何是不去不來的人答昨日有人亦如是問問有一無病人服盡靈丹命在呼吸未審是什麼人答不因漁父引怎得見波濤問有一大病人從來不服藥壽得長生未審是何病答叔孫禮可信天子貴難明問當途猛虎踞劈頭相遇時如何答背後的一場懡㦬問除卻現前身如何本來面答悄語不若低聲問生長王宮不知貴窮途落薄時如何答莫將前路險説與夜行人問家私蕩盡無錐立伏藏出現時如何答眼裏無筋不是好人問客路中人前不及村後不迭店沒棲泊時如何答一翻雨過一番寒問拈槌豎拂不當宗乘古人橫拈豎弄又作麼生答山東宰相山西將問繁興問答只為其中如何是其中的答東西休辨南北須分問其中端的承玄旨不落其中又若何答蘇嚕蘇嚕㗭利蘇嚕答無情話九問問無情説法是何章句答家藏白澤圖不降門外怪問拂子説法香爐得聞麼答兩耳對兩耳問有情説法無情還聞麼答同家不共活問佛祖説法是有情説是無情説答更教我道甚麼問佛未出世草木瓦礫還説法麼答只許和南不容禮拜問靈雲見桃香嚴擊竹莫便是無情為有情説法麼答笑時牙齒露又云馬是官馬不用搭印問生公説法石點頭為什麼無情類有情答孤雁聲回沙塞夢蘆花影動釣漁舟問會無情説法者向上還有事也無答減灶不添兵問無情説法是最初句是末後句答添兵不減灶答本行禪人四問問善財童子在妙高峰參德雲比丘如何又在別峰相見答欲見葛仙翁須繇樵子徑問世尊在法華會上指示化城人只言寶所在近不言其方何也答指不指指問二祖云覓心了不可得如何經中又道應無所住而生其心答驢頭沒馬頭回問善財樓閣參彌勒何故彌勒又從他方來答不放風前火難燒山裏山答禪客十八問問向上轉處可以穿天下人鼻孔如何是轉處答無鬚鎖子兩頭搖問大用現前不存軌則如未現前還有軌則也無答喫飯休言飽休糧莫道飢問古人道一縱一擒一殺一活有甚麼本據用此等作略答後園蘿蔔大問香象渡河截流到底如何是到底的事答長鯨一吸西江水露出珊瑚撑月枝問難咬難嚼難見難透節角淆訛處請道一句答癡人面前不要説夢問機機相赴句句相投且從上來甚麼人合恁麼事答開眼莫尿床問聲前一句千聖不傳如何是不傳意答波斯嚼冰鐵問會則塗中受用不會世諦流布會與不會過在甚麼處答不敢相欺問建法幢立宗旨向何處舉揚答牛字從頭起問定龍蛇別緇素在那裏施設答雷門布毒鼓問天不蓋地不載是甚麼物答無可奈何花落去似曾相識燕飛來問來為先鋒去為殿後只饒不去不來又作麼生答幾乎打破蔡州問運籌帷幄決勝千里甚麼人底手段答丈二眉毛頷下生問斬釘截鐵衲僧本分無此作略如何為人答殺人不用刀問頂門具眼肘後有符不恁麼來如何接待答漆桶不快問牢關把住鎖斷要津有方便也無答其意至誠無不感應問似鶻摩天如虎插翅此意如何答不因沙塞雁怎識海門秋問水上葫蘆是肯語不肯語答驢唇搭馬嘴機緣僧問但有佛法可商量亦是韓盧逐塊若無佛法可商量猶如離宮失殿如何得卻好一句師云舌頭百雜碎僧云猶是胡餅裏討汁師云血滴滴的為海浪禪人舉火父母未生前境界風未起覓海浪了不可得父母既生後境界風正起假名為海浪即今境風已息海浪初停有眼不見色有耳不聞聲然雖不見不聞舉火炬云要且海印發光上來與麼舉示海公還會麼擲火炬云不見一法即如來是則名為觀自在侍者問亡僧即今向甚麼處安身立命師云在你鼻孔裏雜著題達磨像贊者個若是老達磨當時天子識何難汝不是渠渠是汝分付諸人仔細看生死十詠生同夢裡醒死似夢中睡惟有大醒人惺惺常不昧生誰拖死尸死奚拖不去夢想兩不俱枕頭忽墮地生死人間世堪嗟事似麻盡營兒女計誰悟眼前花生憂難得官死憂官不久除卻陶淵明孰不戀五斗生前秉大義死後護禪思勇敏獨髯公一點吹毛利生死因緣會參尋貴眼明悟迷誰得失隔壁墮叉聲生緣薦得親死句投機鈍黃櫱打臨濟婆心為徹困生既未知生死又焉知死達磨不會禪夫子不知禮生死出入息壽夭原不二彭祖八百年陳團一覺睡生時豎一指死時垂一足十力大丈夫始終道不辱和普明禪師牧牛頌韻未牧只在山前山後哮苔痕新迹似非遙鋤犁不得牛來拽野水荒田怎種苗初調頑蠻打教肉皮穿鞭斷從新再換鞭若更奔馳逞野性夜間高繫日間牽受制殷殷調爾暫忘馳忽忽乖違用緊隨直下教伊狂性歇絲毫不盡肯言疲回首喜爾知非自轉頭轟轟烈性已溫柔還如頑鐵初經煆煉久方純繡不留馴伏放去看伊往那邊荒田不揀草綿然東西不亂纖毫步爾既馴兮我不牽無礙路頭純熟意方如鼻斷枯樁不受拘喜得山中水草足一聲短笛日無餘任運緑水青山在眼中寒巖看爾草茸茸而今運足知傷觸體盡虛明夜色濃相忘往來路斷白雲中月色依依絶異同不是草深無覓處都緣無意辨西東獨照覺來一曲萬緣間明月孤圓空漢間影落寒潭無透路殷勤撈摝始相關雙泯雲無虛影月無蹤孰證從前雲月空不信泥牛歸大海別參木馬驟花叢警玄篇并序古者以日月星配乎三教今有不得其旨者互相詆訾以惑來學於戲殊不知見性無尚乎釋保命莫過乎道治世必遵乎儒是三者綱維大道猶鼎之足也且夫釋家衣鉢代不乏人今雖像季猶有得其傳者儒則無論惟道家竟失其傳然有修者循名滯迹亦鮮成功余皆年亦曾訪及終南得一二稍通玄理者猶未盡然故作警玄篇以曉其趣亦猶黃龍點洞賓之意焉其詞曰靜觀造化根闔闢猶橐籥吾人空洞心泛應無適莫昧者多勞勞惺者惟落落飄然煙霞外昔亦慕所樂流覽諸子書丹經知大約精神行氣主氣餒精神惡要欲邁形骸必先志寥廓無欲是丹頭忘情乃靈藥精一坎離交失念火候錯存誠神復虛中和道盤礡沐浴去渣滓防危安淡泊會理總無門施為各有托孟子養浩然老聃守柔弱猶羡康節云天地尚吾作名教憑群英隨宜善斟酌靈性即金丹餘門總戲謔故吾老金仙聖凡齊掃卻故吾非故吾故吾方灑落浮世逐浮華誰解真修學為報參玄人無為名迹縛在淵珠公結制蘭芎參無字話一日于洗面處忽觸石鞏因緣摸著自己鼻孔不無歡喜爭奈仍被趙州狗子攔卻活路不解作獅子翻身因述二偈示之石鞏一張弓自射卻不解架箭三十年拗折始痛快打殺趙州狗爛醉曹山酒莫道佛性無一吐七八斗示靜心禪人言思動靜自分明不動干戈定太平佛祖到來無著處莫嫌衲子不容情示心印禪人叵耐西來老達磨九年面壁竟何圖自云航海傳心印及至傳心一字無示大生禪人道成須得髑髏乾熟息移人固自難一息不來誰是我君今應作死尸看示五雲參誰字念佛者是誰晴空轟霹靂當機覿面提雲捲千山亟示行者作務作者是何人務者是何物直下便承當主人仍受屈示水頭溪淺杓柄短溪深杓柄長忽然杓柄斷斯不屬商量坐石若將石作佛人人皆禮拜若將佛作石坐臥有何怪題天童密雲老和尚像贊咄哉者老和尚單用一條白棒不管是非便打佛祖也難近傍題夢雲靜主募米疏吾友夢公殊不群欲結茅廬掩白雲探盡青山尚無處數聲猿嘯已先聞然雖萬事皆已休己躬下事仍為謀良以不能煮白石夫惟檀越資清修但得四八願成就一卷真經消白晝消白晝檀信之功自無漏募諷華嚴經引佛種從緣起殊因信心力受持尚雜花功德不可測即于一塵中示經現尊特在在處處然法法心心得舌相流泉光慈容出山色琅𪻱才展看梵音動林樾心開古岫雲性冥清溪月不須移一步百城頓已謁奉勸清信士莫昧靈山記標名選佛場皈命華嚴會夙業等間消常光永不墜好把不堅財博茲真富貴堂規世良馬不煩鞭影仙陀婆曷待叮嚀所以上根利智之士入門知有乘言會宗自是不規而規不矩而矩何法道繩墨之不合哉今禪侶既衆其機器云為寧無太過不及者乎故約堂規數條各知遵守庶使就乎中道而殆無索鹽奉馬之誤亦鞭影之謂也歟僧約蓋巧木不彈而自直智人不令而自行奚待夫繩墨而後為然哉其如品類間有不齊苟非規矩而孰能一之是以百丈建立叢林所制有禮法焉有擯辱焉務使人人舉措得宜威儀整肅動靜有常去取有節莫不規正學者之心術而後可使決擇其玄奧耳賞罰既分明人矣故爾略取數條砥礪吾人智刃庶齊其所不齊以報佛祖之恩乎
