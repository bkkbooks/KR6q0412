body:
  text: 書記淨癡録門人本致輯崇禎己卯冬結制小參聞聲悟道見色明心觀音將錢買胡餅放下手卻是饅頭這般話也大奇特山僧則不然夜半摸得個拂子拈起也是拂子放下也是拂子也有些子奇特拈起時直得乾坤陡暗放下時從教海晏河清更有不拈不放的句子諸善知識若也知得便可與三世諸佛歷代祖師把手共行其或未然且聽山僧處分驀舉拂云這個天見之為天人見之為人仁者見之為之仁智者見之為之智百姓日用而不知良可悲哉且道還有知者麼今日法筵初啓四衆雲臻豈不是知有此事雲峰禪人為山僧造祖衣請說法豈不是知有此事及衆護法宰官參請豈不是知有此事信麼信則知知則信乃舉袈裟角云大庾嶺頭提不起我今舉出大家看僧問聞聲悟道喚甚麼作道師云君子惟慎口進云見色明心將什麼作心師云山僧口唇未生白醭在進云觀音將錢買胡餅放下手卻是饅頭意旨請師再舉師云且道我舌頭在不在僧擬進語師便喝晚參二七去三七來也曾大遣也曾大排白汗出了又出妄緣灰而復灰秪恁麼休去歇去木頭石塊去第一義諦灼然昭著從教枯木花開大衆還信枯木花開麼作手舞勢云只有一雙無相手不曾容易舞三台小參三七從來二十一若智若愚俱委悉及問前三與後三十個五雙會不得千七百則亦復然拶未透時如鐵壁朝鐵壁暮鐵壁二六時中無罅隙人人不奈鐵壁何誰知鐵壁好消息好消息識不識遠山濃似佛頭青近水湛如僧眼碧乃舉昔日白雲端云參究古人公案未透時如鐵壁相似及乎透了元來自己是鐵壁山僧則不然參究未透時如鐵壁及乎透了百雜碎且道古人道的是山僧道的是試簡別看一僧出云二俱有過師云百雜碎進云轉見有過師云晴天不肯走直待雨淋頭監院問三七已去敢問赤梢鯉魚能有幾個師云滿堂俱是進云個中還有透網金鱗麼師云驢子腳下騎進云恁麼則堂內坐禪堂外禪坐去也師云再跳跳看院禮拜師便下座小參師舉拂云大衆拂子舉揚個事了也說法了也直得三世諸佛側立下風歷代祖師亡唇結舌只這拂子有如是威光如是奇特山僧今日為他作個通事舍人且道如何是他拂子所說的法他道五蘊山頭一段空明明獨露主人公殷勤五七無尋處只為全身在此中這個意旨初結制時山僧已曾舉拂子道得魚忘筌得兔忘蹄得意忘言爭奈諸人不能直下薦去乃不得已扯上葛藤還將拂子蓋覆殃及諸人朝尋暮尋橫尋豎尋三七排遣四七立香及乎尋至五七日有尋不得者攢眉蹙額或有見些光影者眼豁眉開殊不知總不干拂子事亦不干山僧事卻是你諸人覿體錯過有如是事而又五日一考工七日一小參挨拶得你諸人行也如拂子住也如拂子坐也如拂子臥也如拂子眼也如拂子耳也如拂子乃至心意識皆如拂子何以到我室中問著諸人拂子便道不知我道不知卻好妳又道不會我道不會最親切你又道不知恁麼教我也沒奈何又只得教你極力參取去衆中如有知得拂子落處者出來相見僧問拂子說法且置如何是覿體一句師云喚作拂子則觸進云古人道第一句薦得堪與佛祖為師如何是第一句師云無你問處進云第二句薦得可與人天為師如何是第二句師云你問不著進云第三句薦得自救不了如何是第三句師云問著則不堪進云敢問吾師還是那句中薦得師云你不會我意進云恁麼則拂子頭邊無限春也師云閒言語小參輒輒結制來不覺期已半無相主人公朝暮惺惺喚父母所生眼莫教烏豆換向來拂子說法已六七矣爭奈不遇知音今日借重拄杖子行新條令乃卓拄杖云說法了也當知拄杖子相承少林單傳之旨直指人心不立文字有所說法是真語者實語者如語者不誑不妄不異語者于斯會得便知青青翠竹總是真如鬱鬱黃花無非般若變大地作黃金攪長河為酥酪不為分外其或未然自是諸人根性遲鈍莫道拄杖子有所祕密不顯說好乃舉昔日芭蕉和尚道你有拄杖子奪你拄杖子你無拄杖子與你拄杖子師復云阿㖿山僧錯說了也衆中可有記得芭蕉說的麼出來舉看監院問畢竟如何是芭蕉說的師舉拄杖云會麼進云大衆證明師云也須知恩報恩始得院便禮拜師誕日小參一念渾忘吾我我了無生死得相關本來面目元如是奚假南山作壽山諸仁者還見本來面目麼良久云秪這是若向這裏會得始不被佛祖相瞞乃舉世尊初生一手指天一手指地周行七步目顧四方天上天下惟我獨尊這則公案商量者極多錯會者不少人人盡道世尊離兜率降皇宮方能如是還夢見麼殊不知水牯牛初生下不止周行七步目顧四方而已又作麼生會即我山僧初生時無氣及燒胞始叫一聲而舉家相慶然彼時山僧曾不知父母生我亦不知自有氣無氣及燒胞始叫一聲舉家相慶亦不知有內六根外六塵中六識乃至物我之名聖凡之號混混沌沌七竅未鑿渾然一際大衆蓋此初生時節非獨山僧如是要且若男若女莫不如是然則何以佛是佛水牯牛是水牯牛吾人是吾人諸仁者知麼鏡分金殿燭山答石樓鐘冬至小參舉古云有物先天地甚麼物無形本寂寥強叨叨師拈拄杖云我今為衆親拈出乃卓一卓云從來只麼赤條條赤條條似吾曹能為萬象主不逐四時凋諸仁者好生觀剎剎塵塵絶覆藏為渠非物非非物切忌從中道短長乃舉昔有僧問一老宿云一陽來復日長一線未審佛法長多少宿云長一線後復有一老宿云一線長師拈云二老宿雖有補綴虛空的手段要且紅線未斷只向長短上作活相去佛法奚啻十萬八千若是山僧則向他道休將玉線較長短好把金針繡出看且道繡個甚麼師以拂子打一圓相僧問既云一陽生為什麼古幹依舊赤條條師云冬至子之半天心無改移進云秪如霜清月冷水凍魚沉又作麼生師云一陽初動處萬物未生時進云節令乍從今日起歲華猶似去年晴師云玄酒味方淡太音聲正稀僧問有物先天地無形本寂寥還許學人會麼師云萬里長空片雲點破進云木女頻頻撾石鼓師云但形文彩即屬染汙僧禮拜起立云正恁麼時聻師云好個漆桶書記問鴛鴦繡出從君看不把金針度與人三藏十二部一千七百則都是鴛鴦如何是金針師以手搔鼻云山僧鼻孔有些癢進云某甲則不然師云你又作麼生書豎一指云穿卻佛祖鼻孔去也師云也許你一半結制示衆得魚忘筌得兔忘蹄得意忘言得了那個驀豎拂云忘了這個且道如何是那個乃放下拂子良久云還有相委悉者麼須知達磨西來直指人心見性成佛然乃心無形相且作麼生指性無方所又作麼生見莫是無見而見麼莫是見物便見心麼莫是心地法眼能見麼直饒與麼見得未是衲僧巴鼻且道如何是衲僧巴鼻一堂風冷淡千古意分明舊住大本老宿設茶請示衆師云大衆茶多喫鍾大本老師為此象田二十餘年辛苦方有今日悅衆云茶已喫了請師還茶錢師云更要山僧畫蛇添足麼乃顧監院云常住有事不妨商量商量院舉三登禪師作知客登出衆固辭師云我有一問如道得許坐禪道不得即作知客登云某向無舌頭師云這般話當不得也要山僧肯乃托手云你更道看登默然師遂說偈云托出虛空一片心秪將此事售知音筵中若有真相識黃葉何妨指作金復云大衆謝茶覺初禪者設茶請示衆古人道人莫不飲食也鮮能知味也是這般話言淡而旨遠時人往往強作道理解注怎解注得下要且有口者孰不解飲食有舌者孰不知滋味然喫淡即知淡味喫鹹即知鹹味以至喫酒定不說是茶且有善喫茶者才沾唇便知此是天池此是龍井此是松蘿一毫也瞞他不得那裏不是他知味處大都不知正味耳諸仁者要知正味麼須向未喫茶時識取若識未喫茶時滋味了更須知入口時滋味若知入口時滋味了又須知喫茶後滋味直饒恁麼了要知覺初禪者今夜設茶的意秪要諸禪德閉口然而丈夫有口要開便開要閉便閉為甚麼要人設茶然後閉口有等好事之者或逞才辨或逞學問或逞道理搖唇鼓舌妄生長短殊不知言生理喪故藉善知識于空中突出一言半句直如金剛圈栗棘蓬使人吞不得吐不得等閒塞斷人咽喉饒你有口到這裏也無用處只如昔日趙州問一僧曾到這裏麼僧云曾到州云喫茶去又問一僧曾到這裏麼僧云不曾到州亦云喫茶去時院主在座問云和尚為甚麼曾到也喫茶不曾到也喫茶州亦云喫茶去諸禪德這則公案千古之下塞斷人咽喉然還塞得山僧的咽喉麼良久云且喜山僧咽喉不塞自斷也便歸室示衆挂鉢千山裏霜空境寂寥一心冰更冷諸念已圓消且道是甚麼人境界上來諸佛祖斯門已成就現在諸禪侶合各證圓明行行諸菩薩應當如是學諸仁者切須篤信力行若信有十分則悟有十分悟有十分則行有十分行有十分則證有十分所謂佛法如大海轉入轉深直到修證不立人法兩忘直須更進一步則知海底飛紅塵山頭翻白浪僧問海底飛紅塵山頭翻白浪是阿誰境界師云問在答處進云煩惱海中為雨露又作麼生師云答在問處進云吾師恁麼話慣賣死貓頭師云一般冷色空山裏霜葉雖紅不是春桂庭居士設茶請示衆靜夜霜鴻天外過圓通筵上幾禪和聲消聞脫渾無際誰謂觀音在普陀大衆要知普門品人人具有所以道應以佛身得度者即現佛身而為說法應以菩薩身得度者即現菩薩身而為說法應以居士等身得度者即現居士等身而為說法雖則現身可知且道法如何說即如雞鳴清曉犬吠黃昏事存函蓋理應箭鋒又如磬出雲衢歌來漁浦醒迷途之幽夢啓靜慮之玄門妙在渾忘管帶不立功勛所以道將聞持佛佛何不自聞聞蓋聞理既妙見性亦玄然理固如是且道事作麼生秪如今夜桂庭居士聞此象田安般若期特特入山設茶供衆又合將何酬他則是良久云即此見聞非見聞無餘聲色可呈君爾策居士設茶請示衆古鏡埋塵黑似漆左揩右磨光赫奕懸向虛空照膽寒偷心管教一時息大衆要見古鏡麼以如意畫圓相云應如是知如是見如是信解莫生法相倘有個漢出來道法相生也便向他道應如是知如是見如是信解莫生法相所以古德道須參活句莫參死句若向活句中薦得可與佛祖為師向死句中薦得自救不了乃舉雲居舜老夫少時在洞山聰會下一日乞食鄂渚有居士問舜云古鏡未磨時如何舜云黑如漆又問磨後如何舜云照天照地居士笑云上人不是洞山來耶舜默慚馳歸舉似聰聰代前語此去漢陽不遠又代後語黃鶴樓前鸚鵡洲舜悟其旨今夜居士若問山僧古鏡未磨時如何則向他道門前水一溪磨後如何便道屋後山萬層居士若向這裏會得始知本有光明照天照地不孤今夜設茶其或未然大須策起眉毛好僧問古鏡當空胡來胡現漢來漢現胡漢不來時又作麼生現師云喫茶也未進云露滴松枝翠青山絶點埃師云喫茶莫道渴進云恁麼則慣捉龍頭擒虎尾無名山上顯雲雷師云間言語僧問人人有面古鏡且道如意還有古鏡也無師云牙齒一具骨進云打破鏡來又作麼生相見師云耳躲兩片皮進云恁麼則雲歸五夜曉月落萬山寒師云知你不知落處在師誕日蓮宗禪人設茶請示衆養愚端的在蘿間終日無心思往還雨滴喬松聲歷歷風疏修竹韻珊珊因觀流水心常寂為玩浮雲夢亦閒滿座嘉賓豈偶爾煮茶相共話青山豎如意云大衆今日是我如意師兄誕日蓮宗上人特特設茶而幸嘉賓畢聚亦莫大之緣也諸仁者欲識佛性義當觀時節因緣今既是我如意師兄降誕時節便好識佛性義發如意信既信入已更當修如意行成如意事作如意福滿如意願至于如意了達如意證入則世出世法莫不如意還信麼信則法法皆如意究竟般若波羅密僧問佛性義師已道了秪如今夜上坐下陪主賓奉向且道是向上事否師云喫茶如意進云燒破燭痕紅滴滴何人不喫趙州茶師云喫果如意進云即此月冷香沉風高樹肅又作麼生是茶罷一句師云知音不在重重舉達者應須暗裏驚法源禪人設茶請示衆以如意畫圓相云衆兄弟看看此乃萬法之源衆靈之宅不可以空空不可以色色包法界而非寬入微塵而非窄然則有渠不得無渠不得名渠不得狀渠不得向渠不得背渠不得取渠不得捨渠不得良久云默時說說時默大施門開無壅塞無壅塞青山青白雲白白額尾巴焦烏龜眼睛赤好消息明中坐舌頭暗裏抽橫骨今夜法源上人設茶偶爾話及若也知端的夜半金烏出還有知端的者麼出來相見看僧問如何是萬法之源師云生鐵如意被蟲蛀進云徹法源底一句作麼生道師云默時說進云萬古碧潭空界月再三撈摝始應知師云說時默炳宇姜居士設茶請示衆世上萬般皆小事惟有參禪是大事參禪意在了生死諸人生死了也未話頭卻是取燈子點著炳然照海宇回此光明反照看物物頭頭皆自己皆自己忘彼此秪要諸人心自委但得心空及第時始知佛種從緣起炳宇居士慕龐老慕龐老君財莫沉湘水好將來施與轉法輪二施之功非小小了得三輪體本空即此便是無上道今夜炳宇設茶仍請山僧示衆記得高峰和尚道資生貴圖求富參禪貴圖求悟參禪若同資生個個超佛越祖甜瓜徹蒂甜苦瓜連根苦吾聞居士善能作家又慕禪道可謂佛法世法打成一片乃甜瓜徹蒂甜也雖然如是且道龐居士問馬祖不與萬法為侶者是甚麼人祖云待汝一口吸盡西江水向汝道意旨如何僧問心空及第且置佛種從緣起請師再舉師云香煙書梵字進云不因修竹吟風弄怎解孤松吼太虛師云好詩句湛如上人設茶請示衆盡十方世界是個自己爭奈諸人不委只得強你看個念佛的是誰大似按牛頭飲水前日也按牛頭飲水今日也按牛頭飲水後日也按牛頭飲水後後日也按牛頭飲水且教日日只如此卻如夢裏合眼跳黃河人人將謂逃生死一朝忽地醒將來啐只道有多少奇特元來只是這般底脫卻籠頭謝卻角馱捩轉面皮當處作主從前許多淆訛公案解交不得的當下如冰釋耳今夜湛如上人設茶復請山僧示衆簡點將來大似佛殿裏屙屎衆中或有未盡然者不妨再潑一杓惡水往往謂念佛參禪不同誰道參禪念佛不二當知參禪參此心也念佛念此心也蓋參禪者貴乎心如墻壁方可入道念佛者貴乎一心不亂始得三昧若得心如墻壁自然一心不亂若得一心不亂自然心如墻壁豈有二哉所以古德道參禪為了生死念佛亦為了生死要在生死切則信心切信心切則參念切參念切則一心不亂一心不亂則無一法當情無一法當情則惟心淨土本性彌陀現前本性彌陀既現前見色時則彌陀眼家出現聞聲時則彌陀耳家出現乃至分別法時則彌陀意家出現然彌陀既在六根門頭出現則六塵自淨眼見色則色乃淨土耳聞聲則聲乃淨土乃至意分別法則法乃淨土六根六塵既如是則六識亦如是要且不離穢土而見淨土是故一句彌陀有如是威光如是妙用能使上根者直下薦取等諸佛于一朝越三祗于片念中下者不妨漸修漸證至于匹夫匹婦亦可與知與能大矣哉阿彌陀歟僧問既云惟心淨土本性彌陀為甚麼教中又道從是西方過十萬億佛土師云從是西方過十萬億佛土進云又道人人本具個個圓成為甚麼學人不會師云人人本具個個圓成為甚麼不會進云恁麼請大衆謾念彌陀再喫杯茶去師乃高聲叫云大衆再喫杯茶僧禮拜慧空上人設開口茶請示衆永嘉道了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂若依山僧簡點將來大小永嘉卻似寱語何則然既無人無物又見個甚麼見者又是個甚麼象田這裏則不然有好山有好水有好賓有好主堂裏諸師不語而語堂外諸師語而不語又喜執事殷勤內外和美但光陰迅速一期又將畢矣今夜慧空上人又設好茶請禪師開口試請出來開口看且道象田與永嘉是同是別衆默然師云既喫開口茶了大家不妨說說一僧云師耳聾麼師云唔只可堂裏講話謝茶解制夜道興師設茶請示衆乾峰道舉一不得舉二放過一著落在第二雲門出衆云昨日有僧天台來今日卻往徑山去師云山僧則不然驀舉如意云大衆會麼如意之法如優曇花時一現耳向這裏薦得則知舉一其或未然則落二去也今夜道興師設茶請說解制意若論解制則須上大人丘乙己一一從頭起今冬一期乃虧了如意拂子說法也是如意拂子答話也是如意拂子有時問如意答如意問拂子答拂子有時問如意不答如意問拂子不答拂子有時問如意答拂子問拂子答如意有時總不恁麼所謂回互不回互回而更相和不爾依位住大衆若知得如意的落處則知拂子落處若知拂子落處則知如意落處知麼堂裏也如意堂外也如意及施主來設茶辦齊悉皆得如意既皆得如意為甚麼如意卻在山僧手裏良久放下如意云如意則且置如何是解制一句有麼請出來道看如無自道去也便歸方丈庚辰歲冬不語期結制小參江南不語期其來久矣上承石霜置枯木堂安枯木衆務在克期取證者也是以貴乎操履而不貴乎言說然初又不妨言說何以蓋其人既衆則未免見有明昧行有淺深故進期頭三日必須勘驗見地審究工夫見處既明路頭已正然後特設閉口茶以一衆志而惕勵深操於是繼之三七排遣要在洪波浩渺處證取也四七站香要在壁立萬仞處證取也至于五七坐香以去要在寂然不動處證取也於四儀中如是用心則契道忘言故謂之不語豈做模打樣者可同日語哉然雖如是衆中倘有不待修證而薦去者不妨出來相見問答不録晚參忙忙日月相催逼才則安期已二七莫道家書無路通霜鴻聲度孤峰側衆兄弟聞不聞聞則遐邇一體不聞則動靜體一若恁麼領略何其現成何其省力從教眼處聞聲耳門見色然雖如是更須知有衲僧巴鼻且道如何是衲僧巴鼻乃卓拄杖云咦晚參一七一七不覺三七撲面霜風令人汗出且道既是撲面霜風為甚麼卻令人汗出知麼時不待人生死事迫兄弟家果能信得生死事迫不怕疑情不奮發不怕工夫不得力不怕心地不開通不怕公案不明白如或未然看看一期逗將畢個事依然黑如漆他日老閻拷飯錢朝打三千暮八百咄晚參師良久以如意擊香几三下云會麼先以定動後以智拔法身不墮於諸數四七從他二十八麻三斤乾屎橛千七百則爛葛藤信手拈來都是藥兄弟家隨分服取一貼管取身病心病禪病乃至無始已來世醫拱手的夙病一時都了卻昔日文殊師利命善財童子採藥殊云是藥採將來善財遍採無不是藥卻來白云無不是藥者殊云是藥採將來財拈一莖草度與殊殊接得示衆云此藥亦能殺人亦能活人有殺有活有縱有奪還他作家驀豎如意云象田者一莖亦能殺人亦能活人脫或遇著個四大忘我百骸調適的出來且道殺他則是活他則是放下如意云須知者一著晚參五七三十五日矣個事諸人委未委分明動靜總承渠何自忙忙尋自己尋自己強作主一朝興盡路頭窮始信踏翻波是水伶俐漢撩起便行明頭一句且許你暗頭一句猶未許且道如何是暗頭一句舉杜順和尚法身頌云懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膊上只此一頌直如萬仞銀山你欲上作麼生下腳亦如一團栗棘你欲吞作麼生下嘴山僧不惜眉毛一一下個著語懷州牛喫禾上大人益州馬腹脹丘乙己天下覓醫人化三千炙豬左膊上七十士衆禪德如其忍俊不禁齊出來道長老恁麼著語大似將土泥裏洗則向諸人道爾小生八九子佳作仁可知禮也晚參六七工夫成底事諸公不用重籌慮千方百計總徒勞但得心空方及第山僧恁麼告報如王髻珠雙手分付為什麼無人承當得莫是只為分明極反令所得遲麼莫是小見狐疑轉急轉遲麼莫是夙習濃厚蓋覆佛性麼莫是現業流識違時失候麼莫是家賊難防損失法財麼莫是一曝十寒工夫間斷麼須知總繇自己不干他人事你若只為分明極反令所得遲何不剔起眉毛直下覷破去你若小見狐疑轉急轉遲何不放之自然體無去住去你若夙習濃厚蓋覆佛性何不高提慧劍斬斷情根去你若現業流識違時失候何不把住要津不通凡聖去你若家賊難防損失法財何不捉賊見贓摟番巢穴去你若一曝十寒工夫間斷何不單刀直入良久云後句還有續得者麼衆下語不契晚參七七懶調平亥信口道信手拈乃卓拄杖云鬼神莫測莫測莫測拄杖原來是楖栗西來大意有甚奇特大衆還見達磨祖師麼良久云但秪恁麼幾乎面壁師誕日小參湛兮寂兮父母未生之先寥兮廓兮有生之後依然生死其猶旦暮驀豎拂云這個本不變遷既不變遷則其壽量南山曷得而喻焉松柏曷得而喻焉龜鶴又曷得而喻焉直饒溟靈壽大椿年亦不可得而喻焉則當知其塵點劫前本不曾滅今日又何以生本非衆生今日又何以成佛本無元字腳今日又何以說法本非佛非衆生今日又何以度生然既如是要且世尊何故離兜率降王宮八相成道說法度生也只為應個時節今日大衆為山僧慶誕復請小參也不可不應個時節且道如何是應時及節的句以拂子拂一拂云不萌枝上花開無影樹頭鳳舞心田趙居士設茶請示衆佛說僧為淨福田福田端的在心田心田居士信福田為種福田到象田教中較量福田功德云飯惡人百不如飯一善人飯善人千不如飯一持五戒人乃至飯三世諸佛不如飯一無心道人畢竟何等樣的是無心道人惟有真參實悟的衲僧不求諸聖不重己靈淨裸裸赤灑灑沒可把終日喫飯不曾咬著一粒米終日穿衣不曾挂著一縷絲方可為無心道人今晚心田居士設茶供衆結般若緣大衆相聚喫杯茶且道還從口入麼如從口入必然灌溉心田既灌溉心田平日所參知識所有般若種子自當發生為甚麼道善財參遍處黑豆未生芽驀豎如意召云大衆衆舉首師云黑豆芽生也設開口茶請示衆拈花微笑不傳之妙少林面壁重玄之則是乃至道也而世人希及之善繼其道者非吾枯木堂中客而誰兄弟家合生慶幸當知不是一生兩生三四五生而種般若根定是靈山親承授記來還識不傳之妙麼以如意左邊擊云咦還識重玄之則麼以如意右邊擊云咦向這裏會得一任開大口吞卻乾坤吸乾滄海其或未然喫茶也須防咽解制小參舉世間覓一個無事無為人難得不碌碌于名利則碌碌于衣食拈拄杖云只有這個木上座終日赤條條不挂一絲不占粒米無聲無臭無事無為衲僧家若能如是則可與伊作同參有自繇分若不然者明日出門不易洞山道兄弟家東去西去須向萬里無寸草處去象田則不然兄弟家東去西去一任向草披離處去秪是不得觸著死蛇頭若觸著他則斷子命根亦不得背著他背著他則不知伊落處要且不觸不背一句作麼生道放下拄杖云了示衆至道無難唯嫌揀擇若然則何必辨金沙分玉石拈拄杖云恁麼拈來用得親卓一卓云會麼又卓一卓云不會麼但莫憎愛洞然明白雖然更須知有一人不在明白裏大衆還識此人麼復卓一卓擲拄杖歸室小參今日不為別事有則古公案與衆判斷判斷良久以拂子拂一拂云判斷了也諸仁者還見據款結案處麼如未見且看判第二則去舉世尊一日升座默然良久羊打乾處臥文殊白椎云諦觀法王法法王法如是驢打濕處溺這則公案自古至今俱判為作家相見高提向上若如斯見解要見他師資唱和的落處何異面南看北斗今日山僧于無意中驀忽覷破黃面老子與文殊做處大似把手上高山未免傍觀者哂甲戌冬天華寺秉拂舉拂云拈起天華拂一枝衝開石傘雲千尺遂豎拂云會麼放下拂云不會麼須知會與不會總不干他事所以達磨西來直指人心不立文字良久云大衆莫更要首座畫蛇添足那以拂左右擊云不徒打草只要驚蛇莫有喪身失命者麼回顧大衆云阿誰不挂眉間劍莫待腥紅濺梵天僧問群陰剝盡時如何師云明日一陽生進云一陽生後如何師云萬象增輝進云正恁麼時是何時節師云非君境界晚參道人貴辦鐵肝腸逆順情塵俱莫顧吹毛利在及時磨直下莫留凡聖路絲毫念起喪天真點著不來何劫悟瞥爾情忘萬境閒色色聲聲是甚麼不是心不是佛不是物以拂打圓相云敢問諸人睹不睹團團月上圓如鼓今夜清光絶覆藏等閒識得雲門普敲一拂云當陽一擊碎空明拈來殃及諸君補恁麼補不許恁麼補不恁麼補卻許恁麼補要且端的意如何蘇魯蘇魯蘇魯悉利娑婆訶師兄弟首座恁麼舉揚還有直絶承當者麼不妨更借一則古人公案一一下個注腳與師兄弟簡辨看乃舉藥山參石頭腳跟下錯過了也山對石頭云某甲三乘十二分教頗知藏舟於壑聞南方直指人心見性成佛實未明了藏山於澤乞師指示藏天下於天下石云恁麼也不得面赤不如語直不恁麼也不得千虛難抵一實恁麼不恁麼總不得門外遠山寒有色檻前流水寂無聲山不契鐵橛鐵蒺藜石頭指參馬祖低聲低聲山依教參馬祖如前問千里持來呈舊面一番舉起一番新祖云有時教你揚眉瞬目心月見天水無復乃相比有時不教你揚眉瞬目月明心水清情盡物殊始有時教你揚眉瞬目者是學道苦無方致窮欣有具有時教你揚眉瞬目者不是徘徊清素光寒石高天吹山於言下大悟也是啞子喫苦瓜無伎倆可呈識法者懼但低頭禮拜而已知者不賤用祖云你見甚麼道理便禮拜瞞不得和尚山云某甲在石頭處如蚊子上鐵牛相似不是苦心人不知師兄弟首座與麼注腳了蚊子上鐵牛的意端的得也未如未端的須各努力問答不録小參以拂畫圓相云高懸照妖鏡不降鏡裏怪昨夜南山白額虎咬殺街心石敢當海底泥牛痛不禁賀家池上蝦蟆叫怨苦悲哉媽媽觀世音全身入草淚滿襟欲把淨瓶水手掬與洗令具慈忍力驀有一個不顧好惡的孟八郎劈頭撞著便一喝觀音菩薩連忙旋倒返聞機眼門火星已迸出等間燒卻須彌盧大千世界無灰蹟咦若向者裏直下會得更有甚麼可得不見達磨位下有個神光拋卻己見為法斷臂至於覓心了不可得達磨便與他安心已竟這是第一個參學的榜樣而今時世不古多覓知解且好奇特只管圖口頭便利自謂會得禪了殊不知全是弄精魂與本分事料掉沒交涉若不信但日用中向腳跟下簡點看一切情塵于染不著麼習氣使我不動麼明心見性如觀掌中了了分明麼無夢無想時主人公知得落處麼真當了得我生死麼如果能徹頭徹尾了不妨拈來無不是用去薩婆訶脫或未然所謂未得謂得未證謂證大妄語成忽地生死到來業識茫茫無本可據入地獄如箭射苦哉痛哉悔之晚矣現前諸兄弟雖真實要做工夫然多有不能了當者過在於何不是看做平常或忒看奇特了不知個事初無易難貴乎撩起便行如其不能直下領略自當奮發勇猛心真切心長久心若具有此三心隨分參取一則公案無有不悟去者只爭早晚耳其於工夫自能得力疑情自能頓發妄想自能不生一切境界自能動我不得那時孤孤迥迥峭峭巍巍直是銀山鐵壁頓在面前要推也推不去要歇也歇不下然到者裏無你用心意識處慎勿打退鼓要曉得無你用心處正好用心無你撈摸處正好撈摸無下手處正好下手推門落臼豈有他哉達磨所謂外境不入內心無喘心如牆壁可以入道正是者般時節但莫顧危亡只恁麼驀直向前捱拶將去自有日忽地磕著㘞原來者般現成的始信睦州見人便道現成公案放汝三十棒無業國師見人便道莫妄想至於即今天華堂頭和尚橫拈倒用了無疑矣亦信首座今日之言不謬妄也珍重示做工夫要語八則參究個事如祖上一片間田地久被牛羊踐踏瓦礫堆積間無空隙苟要潔淨須著打屏一番當知吾人心地亦然本來清淨無物奈何無始虛妄人我踐踏五欲塵勞堆積于中求斯須淨處亦不可得安得與大道相應惟有看個話頭是把鐵掃帚直須拼命迅掃一番始得虛豁豁平貼貼身心一如身外無餘正與麼時回觀古人千七百則是甚間家具雖然猶有人不放過你在做工夫無有別法惟精切而已精則用志不分切則專一研究用志不分則雜念不生雜念不生則心光獨露專一研究則無有間斷無有間斷則性體全彰所謂譬如磨鏡垢淨明現豈有他哉有久看話頭而疑情發不起于日用中不得力者無他一者把生死不以為然二者把話頭看得泛了遂致疑情發不起疑情既發不起工夫便不得力工夫既不得力便與昏散打做一團且昏散尚打不脫要脫生死不亦難乎須把生死要看得畢竟是一件極大的事蓋古人示語是斷生死的公案若于公案不決則生死斷斷不明而欲不疑可乎要明生死只將個本參死不放捨頓在目前反覆看渠是個甚麼道理畢竟祖師意在甚麼處立地要討個分曉不明斷不休苟得真疑奮發壁立萬仞便是好消息向這裏著一隻眼悟去有甚難有多于無義味話頭咬嚼既久不得其滋味又不得其趣向往往自謂工夫做不上打退鼓把好光景當面錯過了殊不知但向無滋味無趣向處喫緊看去便是工夫得手處如若于茲不下手然欲望其閒悟驢年去若信得此語及不管做得上做不上得力不得力有滋味無滋味盡情不顧只把個本參橫咬豎咬時刻不放但孜孜矻矻一味咬將去脫或錯口一咬百雜碎那時通身罄快始知我語不欺人也兄弟家要了生死明大道必先把現前習氣及愛惡情識等一朿丟開然後看個本來面目或看念佛是誰或看萬法歸一或看狗子無佛性等話切須咬定一則直下看去從教孤孤迥迥灑灑落落如香象擺脫枷鎖于日用中蕩蕩然無絲毫繫絆管取㘞地一聲有日也做工夫到水清月白時覺纖悉洞然所謂虛明自照不勞心力也雖然猶未是歇腳處須知心照俱亡復是何物工夫貴在一門深入若稍帶聯纖則到底知見淘汰不盡心挂兩頭徒自泣岐至于白首無成悔之晚矣參禪參到覿體處如日方中萬象昭著豈容擬議然亦須知日午打三更夜半日頭紅意旨落在何處始可歸家穩坐也
